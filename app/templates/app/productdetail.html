{% extends 'app/base.html' %}

{% block main-content %}

<div class="container mt-5">
    <div class="row">

        <div class="col-md-5">
            <img src="{{ product.product_image.url }}" class="img-fluid">
        </div>

        <div class="col-md-7">
            <h2>{{ product.title }}</h2>

            <h4>₹ {{ product.discounted_price }}</h4>

            <p>{{ product.description }}</p>

            <a href="{% url 'add-to-cart' %}?prod_id={{ product.id }}"
               class="btn btn-success">
                Add to Cart
            </a>

            <a href="{% url 'add-to-wishlist' %}?prod_id={{ product.id }}"
               class="btn btn-warning ms-2">
                Add to Wishlist
            </a>
        </div>

    </div>
</div>

{% endblock %}
